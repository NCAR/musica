name: Windows ARM64 Setup
description: Setup MSYS2 ARM64 for CI

runs:
  using: "composite"
  steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        # Install from the version-consistent MSYS2 base snapshot instead of
        # running a full `pacman -Syuu`. The full upgrade pulls the newest repo
        # databases, whose PGP signatures the bundled keyring can't verify after
        # an MSYS2 signing-key rotation, causing:
        #   "failed to synchronize all databases (invalid or corrupted database (PGP signature))"
        update: false
        install: |
          mingw-w64-clang-aarch64-cmake
          mingw-w64-clang-aarch64-make
          mingw-w64-clang-aarch64-ninja
          mingw-w64-clang-aarch64-clang
          mingw-w64-clang-aarch64-flang
          mingw-w64-clang-aarch64-hdf5
          mingw-w64-clang-aarch64-netcdf
          mingw-w64-clang-aarch64-netcdf-fortran
          mingw-w64-clang-aarch64-openblas
          mingw-w64-clang-aarch64-pkgconf