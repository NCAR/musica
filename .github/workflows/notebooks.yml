name: Notebooks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run-notebooks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake \
            libnetcdf-dev libnetcdff-dev liblapack-dev libblas-dev graphviz

      - name: Build and install musica with tutorial dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[tutorial] nbmake
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"

      - name: Execute tutorial notebooks
        run: |
          pytest --nbmake --nbmake-timeout=900 -v tutorials/ \
            --ignore-glob='*.ipynb_checkpoints*' \
            --ignore-glob='*hpc_parallelization*' \
            --ignore-glob='*gpu_solver*'
