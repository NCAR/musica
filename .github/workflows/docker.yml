name: Docker

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  docker-build-and-test:
    name: Build and Test - ${{ matrix.dockerfile }} - ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        dockerfile:
          - Dockerfile
          - Dockerfile.docs
          - Dockerfile.asan
          - Dockerfile.memcheck
          - Dockerfile.openmp
          - Dockerfile.mpi
          - Dockerfile.mpi_openmp
          - Dockerfile.nvhpc
          - Dockerfile.javascript
          - Dockerfile.julia
          - Dockerfile.tuvx
        build_type: [Release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

      - name: Build Docker image
        run: docker build -t musica -f docker/${{ matrix.dockerfile }} . --build-arg BUILD_TYPE=${{ matrix.build_type }}

      - name: Run tests in container
        if: >-
          matrix.dockerfile != 'Dockerfile.nvhpc' &&
          matrix.dockerfile != 'Dockerfile.javascript' &&
          matrix.dockerfile != 'Dockerfile.julia' &&
          matrix.dockerfile != 'Dockerfile.docs' &&
          matrix.dockerfile != 'Dockerfile.tuvx'
        run: docker run --name test-container -t musica bash -c 'make test ARGS="--rerun-failed --output-on-failure -j8"'

      - name: Run javascript tests in container
        if: matrix.dockerfile == 'Dockerfile.javascript'
        run: docker run --name test-container -t musica bash -c 'npm run test'
      
      - name: Run Julia tests in container
        if: matrix.dockerfile == 'Dockerfile.julia'
        run: docker run --name test-container -t musica bash -c 'julia --project=julia julia/test/runtests.jl'
      
      - name: Run TUVX comparison tests in container
        if: matrix.dockerfile == 'Dockerfile.tuvx'
        run: docker run --name test-container -t musica bash -c 'pytest'

      - name: Verify documentation build
        if: matrix.dockerfile == 'Dockerfile.docs'
        run: >-
          docker run --name test-container -t musica bash -c
          'test -f /musica/build/docs/sphinx/index.html &&
          test -f /musica/build/docs/doxygen/xml/index.xml &&
          echo "Documentation built successfully!"'

  tuv-x-comparison:
    name: TUV-x Comparison Test (Standalone vs. Python API)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

      - name: Build Docker image
        run: |
          docker build -t musica-tuvx-comparison -f docker/Dockerfile.tuvx . \
          --build-arg BUILD_TYPE=${{ matrix.build_type }}

      - name: Run TUV-x comparison tests in container
        run: docker run --name tuvx-comparison -t musica-tuvx-comparison bash -c 'pytest'
