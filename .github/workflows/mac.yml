name: Mac

on: 
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  c_cxx:
    runs-on: macos-15
    continue-on-error: true 
    strategy:
      matrix:
        xcode: ['16.4']
        build_type: [Release]
        # gfortran must match the gcc Homebrew's netcdf-fortran bottle was built
        # with (currently 15); older gfortran can't read its netcdf.mod.
        compiler:
          - { cpp: g++-15, c: gcc-15, fc: gfortran-15}
          - { cpp: clang++, c: clang, fc: gfortran-15}
    env:
      CC: ${{ matrix.compiler.c }}
      CXX: ${{ matrix.compiler.cpp }}
      FC: ${{ matrix.compiler.fc }}

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Install dependencies
        run: brew install netcdf netcdf-fortran

      - name: Run Cmake 
        run: |
            cmake -S . -B build \
                -D CMAKE_CXX_FLAGS=-Wl,-ld_classic \
                -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -D MUSICA_GIT_TAG=${{ github.sha }}

      - name: Build
        run: cmake --build build --verbose

      - name: Run tests
        run: |
          cd build
          ctest -C ${{ matrix.build_type }} --rerun-failed --output-on-failure . --verbose

  fortran:
    runs-on: macos-latest
    strategy:
      matrix:
        # match the gcc Homebrew's netcdf-fortran bottle was built with (see c_cxx)
        gcc_version: [15]
        build_type: [Release]
    env:
      FC: gfortran-${{ matrix.gcc_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install netcdf netcdf-fortran

      - name: Run Cmake 
        run: cmake -S . -B build -D CMAKE_CXX_FLAGS=-Wl,-ld_classic -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} -D MUSICA_GIT_TAG=${{ github.sha }} -D MUSICA_BUILD_FORTRAN_INTERFACE=ON

      - name: Build
        run: cmake --build build --verbose --parallel 10

      - name: Run tests
        run: |
          cd build
          ctest -E "tuvx_c_api|tuvx_fortran_api" -C ${{ matrix.build_type }} --rerun-failed --output-on-failure . --verbose -j 10