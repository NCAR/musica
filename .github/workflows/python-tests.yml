name: Python tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Test Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-13, macos-latest]
        os: [windows-latest, windows-11-arm]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Windows 11 ARM doesn't support Python 3.9 and 3.10
          - os: windows-11-arm
            python-version: "3.9"
          - os: windows-11-arm
            python-version: "3.10"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install dependencies
      if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetcdf-dev netcdf-bin libnetcdff-dev liblapack-dev
    
    - name: Install dependencies
      if: matrix.os == 'macos-13' || matrix.os == 'macos-latest'
      run: |
        brew install netcdf netcdf-fortran lapack

    - name: Setup MSYS2
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        path-type: inherit
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-gcc-fortran
          mingw-w64-x86_64-netcdf
          mingw-w64-x86_64-netcdf-fortran
          mingw-w64-x86_64-lapack

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Add requirements
      run: python -m pip install --upgrade wheel setuptools

    - name: Build and install (Non-Windows)
      if: "!contains(matrix.os, 'windows')"
      env:
        FC: gfortran-14
      run: pip install -vv .[test]

    - name: Build and install (Windows ARM64)
      if: matrix.os == 'windows-11-arm'
      run: pip install -vv .[test]

    - name: Build and install (Windows AMD64)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: pip install -vv .[test]

    # - name: Test (Non-Windows)
    #   if: matrix.os != 'windows-latest'
    #   run: pytest -s

    # - name: Test (Windows with MINGW)
    #   if: matrix.os == 'windows-latest'
    #   shell: msys2 {0}
    #   run: pytest -s