name: Python tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Test Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: 
          - os: windows-lateset
            python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

          - os: windows-11-arm
            python-version: ["3.11", "3.12", "3.13"]

          # macOS Intel
          - os: macos-13
            python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
          
          # macOS Apple Silicon
          - os: macos-latest
            python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
          
          - os: ubuntu-latest
            python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install dependencies
      if: matrix.platform == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libnetcdf-dev netcdf-bin libnetcdff-dev liblapack-dev
    
    - name: Install dependencies
      if: matrix.platform == 'macos-13'
      run: |
        brew install netcdf netcdf-fortran lapack

    - name: Setup MSYS2
      if: matrix.platform == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        path-type: inherit
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-gcc-fortran
          mingw-w64-x86_64-netcdf
          mingw-w64-x86_64-netcdf-fortran
          mingw-w64-x86_64-lapack

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Add requirements
      run: python -m pip install --upgrade wheel setuptools

    - name: Build and install (Non-Windows)
      if: matrix.platform != 'windows-latest'
      run: pip install --verbose .[test]

    - name: Build and install (Windows with MINGW)
      if: matrix.platform == 'windows-latest'
      shell: msys2 {0}
      run: pip install --verbose .[test]

    - name: Test (Non-Windows)
      if: matrix.platform != 'windows-latest'
      run: pytest -s

    - name: Test (Windows with MINGW)
      if: matrix.platform == 'windows-latest'
      shell: msys2 {0}
      run: pytest -s